name: way2move
description: "Way2Move — movement-first training platform for normal life athletes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.2.7

  # Functional programming
  fpdart: ^1.1.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.3.7
  cloud_functions: ^5.3.0

  # Auth providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.0

  # Image & media
  image_picker: ^1.1.0
  camera: ^0.11.0+2
  video_compress: ^3.1.2

  # UI
  cached_network_image: ^3.4.1
  video_player: ^2.9.2

  # Voice
  speech_to_text: ^7.0.0
  record: ^5.1.2

  # Pose estimation (Phase 2 — AI movement assessment)
  flutter_pose_detection: ^0.4.1

  # Utils
  path_provider: ^2.1.4
  intl: ^0.19.0
  equatable: ^2.0.5
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
